<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaX-Kiel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{height:100vh;overflow:hidden;color:#fff}

/* BACKGROUND VIDEO */
#bg-video{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}
.overlay{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(6px);
z-index:-1;
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:600;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:100;
}
#hamburger{
position:absolute;
left:15px;
font-size:24px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(20px);
transition:.3s;
padding:20px;
z-index:200;
}
.sidebar.active{left:0}

.sidebar h3{margin-bottom:10px}
.sidebar button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

#historyList{
list-style:none;
max-height:70%;
overflow:auto;
}
#historyList li{
padding:8px;
background:rgba(255,255,255,0.1);
margin:5px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

/* CHAT */
.chat-container{
position:absolute;
top:80px;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:900px;
display:flex;
flex-direction:column;
padding:15px;
}

#chat-box{
flex:1;
overflow:auto;
padding:10px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
display:flex;
flex-direction:column;
}

/* MESSAGE */
.message{
margin:8px 0;
padding:12px;
border-radius:12px;
max-width:80%;
animation:fade .25s ease;
}
.user{
background:rgba(255,255,255,0.2);
align-self:flex-end;
}
.bot{
background:rgba(0,0,0,0.4);
align-self:flex-start;
}

/* INPUT */
.input-area{
display:flex;
gap:10px;
margin-top:10px;
}
input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
outline:none;
background:rgba(255,255,255,0.1);
color:#fff;
}
input:focus{box-shadow:0 0 10px #fff3}
button{
padding:0 18px;
border:none;
border-radius:20px;
cursor:pointer;
}

/* ANIM */
@keyframes fade{
from{opacity:0;transform:translateY(10px)}
}
</style>
</head>

<body>

<!-- BACKGROUND (CUSTOM FOLDER) -->
<video id="bg-video" autoplay muted loop playsinline preload="auto" poster="bg.jpg">
<source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- HEADER -->
<div class="header">
<div id="hamburger">☰</div>
<span>MetaX-ell</span>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
<h3>Menu</h3>
<button onclick="newChat()">+ New Chat</button>
<ul id="historyList"></ul>
</div>

<!-- CHAT -->
<div class="chat-container">
<div id="chat-box"></div>

<div class="input-area">
<input id="input" placeholder="Tulis pesan...">
<button onclick="send()">➤</button>
</div>
</div>

<script>
const API="https://api.sxtream.my.id/ai/llama-3.3-70b?text=";
const chatBox=document.getElementById("chat-box");
const input=document.getElementById("input");
const sidebar=document.getElementById("sidebar");
const historyList=document.getElementById("historyList");

let isSending=false;
let history=JSON.parse(localStorage.getItem("metax-history"))||[];

/* SIDEBAR */
document.getElementById("hamburger").onclick=(e)=>{
e.stopPropagation();
sidebar.classList.toggle("active");
};

document.addEventListener("click",(e)=>{
if(!sidebar.contains(e.target) && !e.target.closest("#hamburger")){
sidebar.classList.remove("active");
}
});

/* MESSAGE */
function addMessage(text,type){
let div=document.createElement("div");
div.className="message "+type;
chatBox.appendChild(div);

let i=0;
function typing(){
if(i<text.length){
div.textContent+=text.charAt(i);
i++;
requestAnimationFrame(typing);
}
}
typing();

chatBox.scrollTop=chatBox.scrollHeight;
}

/* SEND */
async function send(){
if(isSending) return;
let msg=input.value.trim();
if(!msg) return;

isSending=true;
addMessage(msg,"user");
input.value="";

let loading=document.createElement("div");
loading.className="message bot";
loading.textContent="MetaX Thinking...";
chatBox.appendChild(loading);

try{
let res=await fetch(API+encodeURIComponent(msg));
let data=await res.json();
let reply=data?.result?.msg || "Tidak ada respon";

loading.remove();
addMessage(reply,"bot");

/* SAVE HISTORY */
history.push({text:msg,reply:reply});
localStorage.setItem("metax-history",JSON.stringify(history));
renderHistory();

}catch{
loading.remove();
addMessage("Server sibuk, coba lagi nanti","bot");
}

isSending=false;
}

/* ENTER */
input.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

/* HISTORY */
function renderHistory(){
historyList.innerHTML="";
history.forEach((h,i)=>{
let li=document.createElement("li");
li.innerHTML=`${h.text.slice(0,20)} <span data-i="${i}">✖</span>`;

li.onclick=()=>{
chatBox.innerHTML="";
addMessage(h.text,"user");
addMessage(h.reply,"bot");
};

li.querySelector("span").onclick=(e)=>{
e.stopPropagation();
history.splice(i,1);
localStorage.setItem("metax-history",JSON.stringify(history));
renderHistory();
};

historyList.appendChild(li);
});
}

function newChat(){
chatBox.innerHTML="";
}

renderHistory();
</script>

</body>
</html>
